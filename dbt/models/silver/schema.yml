version: 2

models:
  - name: stg_flights
    columns:
      - name: icao24
        tests:
          - not_null

      - name: latitude
        tests:
          - dbt_utils.accepted_range:
              min_value: -90
              max_value: 90

      - name: speed_kmh
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1300 # Roughly the speed of sound+ for jets