name: SkyEco Hourly Data Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "Install Dependencies"
        run: |
          pip install -r requirements.txt
          pip install dbt-duckdb==1.9.0 duckdb==1.4.4

      - name: "Step 1: Ingest from Kafka to MotherDuck"
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          KAFKA_BOOTSTRAP: ${{ secrets.KAFKA_BOOTSTRAP }}
          KAFKA_KEY: ${{ secrets.KAFKA_KEY }}
          KAFKA_SECRET: ${{ secrets.KAFKA_SECRET }}
          KAFKA_TOPIC: "flights_raw"
        run: python src/producer.py

      - name: "Step 2: Run dbt Transformations"
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd dbt
          dbt deps
          dbt clean
          dbt run --target dev --no-partial-parse
          dbt test --target dev --no-partial-parse