name: SkyEco Pipeline Run

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librdkafka-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # If you have a requirements.txt:
          pip install -r requirements.txt
          pip install confluent-kafka requests duckdb python-dotenv dbt-duckdb
          # OR manually if you don't have one yet:
          pip install confluent-kafka requests duckdb python-dotenv

      - name: Run Producer and Sync
        env:
          KAFKA_BOOTSTRAP: ${{ secrets.KAFKA_BOOTSTRAP }}
          KAFKA_KEY: ${{ secrets.KAFKA_KEY }}
          KAFKA_SECRET: ${{ secrets.KAFKA_SECRET }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python src/producer.py

      - name: Run dbt Transformations (Silver Layer)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd dbt  
          dbt deps
          dbt run --profiles-dir . --target dev